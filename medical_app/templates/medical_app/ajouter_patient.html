<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI - Ajouter un Patient</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #00a1d6;
            --primary-gradient: linear-gradient(135deg, #005b8f 0%, #00a1d6 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #002f4b;
            --text-muted: #005b8f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            background-image: 
                radial-gradient(at 0% 0%, hsla(195, 70%, 90%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(195, 60%, 85%, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(195, 50%, 95%, 1) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
        }

        .navbar-brand {
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            padding: 2rem;
        }

        .btn-gradient {
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(13, 110, 253, 0.4);
            color: white;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            background-color: rgba(255, 255, 255, 0.9);
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light pt-4 pb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
                <i class="bi bi-lungs-fill me-2 fs-2 text-primary"></i>
                MedAI PneumoScanner
            </a>
            <div class="d-flex gap-3">
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary d-flex align-items-center gap-2" style="border-radius: 50px; font-weight: 600; padding: 0.6rem 1.5rem;">
                    <i class="bi bi-house-door-fill"></i> Tableau de bord
                </a>
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger d-flex align-items-center gap-2" style="border-radius: 50px; font-weight: 600; padding: 0.6rem 1.5rem; border-width: 2px;">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5" style="max-width: 600px;">
        <div class="mb-4">
            <h2 class="fw-bold mb-1">Nouveau Patient</h2>
            <p class="text-muted mb-0">Renseignez les informations du patient.</p>
        </div>

        <div class="glass-card">
            <form method="post">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="{{ form.nom.id_for_label }}" class="form-label">Nom</label>
                        {{ form.nom }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="{{ form.prenom.id_for_label }}" class="form-label">Prénom</label>
                        {{ form.prenom }}
                    </div>
                </div>

                <div class="mb-3">
                    <label for="{{ form.date_naissance.id_for_label }}" class="form-label">Date de Naissance</label>
                    {{ form.date_naissance }}
                </div>

                <div class="mb-4">
                    <label for="{{ form.antecedents_medicaux.id_for_label }}" class="form-label">Antécédents médicaux</label>
                    {{ form.antecedents_medicaux }}
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'dashboard' %}" class="btn btn-light" style="border-radius: 50px; font-weight: 600; padding: 0.6rem 1.5rem;">Annuler</a>
                    <button type="submit" class="btn btn-gradient d-flex align-items-center gap-2">
                        <i class="bi bi-save-fill"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
