<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyser - MedAI PneumoScanner</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #00a1d6;
            --primary-gradient: linear-gradient(135deg, #005b8f 0%, #00a1d6 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #002f4b;
            --text-muted: #005b8f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            background-image: 
                radial-gradient(at 0% 0%, hsla(195, 70%, 90%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(195, 60%, 85%, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(195, 50%, 95%, 1) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .upload-container {
            width: 100%;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            padding: 3rem 2.5rem;
        }

        .btn-gradient {
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-weight: 600;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
            transition: all 0.3s ease;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(13, 110, 253, 0.4);
            color: white;
        }

        .upload-icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(13, 110, 253, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            color: var(--primary-color);
            font-size: 2.5rem;
            box-shadow: 0 0 0 10px rgba(13, 110, 253, 0.05);
        }

        .form-control, .form-select {
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background-color: rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15);
            border-color: #0d6efd;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        /* Django form custom styling */
        form p {
            margin-bottom: 1.5rem;
        }
        form label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            display: block;
        }
    </style>
</head>
<body>

    <div class="container upload-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="{% url 'dashboard' %}" class="back-link">
                <i class="bi bi-arrow-left"></i> Retour au tableau de bord
            </a>
            <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>
        
        <div class="glass-card text-center">
            <div class="upload-icon-wrapper">
                <i class="bi bi-file-earmark-medical"></i>
            </div>
            
            <h3 class="fw-bold mb-2">Analyse Radiographique</h3>
            <p class="text-muted mb-4">Sélectionnez le patient et uploadez une radiographie pulmonaire pour détection automatique par l'IA.</p>
            
            <form method="post" enctype="multipart/form-data" class="text-start" id="uploadForm">
                {% csrf_token %}
                {{ form.as_p }}
                
                <button type="submit" class="btn btn-gradient" id="submitBtn">
                    <i class="bi bi-magic me-2"></i> Lancer l'analyse IA
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Analyse IA en cours...';
            btn.classList.add('disabled');
        });
    </script>
</body>
</html>
