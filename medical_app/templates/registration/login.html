<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MedAI</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --background: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --primary: #0f172a;
            --primary-foreground: #f8fafc;
            --muted: #64748b;
            --destructive: #ef4444;
            --ring: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .shadcn-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            padding: 2rem;
        }

        .card-header {
            text-align: center;
            margin-bottom: 1.5rem;
            background: none;
            border: none;
            padding: 0;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .card-description {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 0;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .form-control {
            height: 2.5rem;
            border-radius: 0.375rem;
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            transition: all 0.2s;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--ring);
            box-shadow: 0 0 0 2px var(--background), 0 0 0 4px var(--ring);
        }

        .btn-primary-custom {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            height: 2.5rem;
            width: 100%;
            background-color: var(--primary);
            color: var(--primary-foreground);
            border: none;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        .btn-primary-custom:hover {
            background-color: #334155;
            color: var(--primary-foreground);
        }

        .icon-container {
            width: 48px;
            height: 48px;
            background-color: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
            color: var(--primary);
        }

        .alert-error {
            background-color: #fef2f2;
            border: 1px solid #f87171;
            color: #991b1b;
            font-size: 0.875rem;
            border-radius: 0.375rem;
            padding: 0.75rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="shadcn-card">
            <div class="card-header">
                <div class="icon-container">
                    <i class="bi bi-lungs fs-4"></i>
                </div>
                <h1 class="card-title">MedAI</h1>
                <p class="card-description">Connectez-vous à votre espace praticien</p>
            </div>
            
            {% if form.errors %}
                <div class="alert-error">
                    Identifiants incorrects. Veuillez réessayer.
                </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" id="id_username" placeholder="Entrez votre identifiant" required>
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-control" id="id_password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary-custom">
                    Se connecter
                </button>
                <input type="hidden" name="next" value="{{ next }}" />
            </form>
        </div>
    </div>

</body>
</html>
